<!DOCTYPE html>
<html>
<head>
<title>Secret</title>

<style>
body{
    background:black;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
    text-align:center;
}
</style>

</head>

<body>

<script>

let password = prompt("Введите пароль ❤️");

if(password === "1234"){
    document.body.innerHTML = `
        <h1>❤️ С днем рождения мамулечка моя! ❤️</h1>
        <p>Добро пожаловать!</p>
    `;
}else{
    document.body.innerHTML = `
        <h1>⛔ Доступ закрыт</h1>
        <p>Неверный пароль</p>
    `;
}

</script>

</body>
</html>
